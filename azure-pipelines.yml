trigger:
  - main

pool:
  vmImage: ubuntu-latest

stages:

  - stage: Build
    displayName: 'Build'
    jobs:
      - job: Compile
        displayName: 'Compile'
        steps:
          - script: echo "Installing dependencies"
            displayName: 'Install dependencies'
          - script: echo "Compiling TypeScript"
            displayName: 'Compile TypeScript'
          - script: echo "Building project"
            displayName: 'Build project'
          - script: echo "Generating artifacts"
            displayName: 'Generate artifacts'

      - job: Docker
        displayName: 'Build Docker image'
        steps:
          - script: echo "Building Docker image"
            displayName: 'Build image'
          - script: echo "Tagging image"
            displayName: 'Tag image'
          - script: echo "Push to registry"
            displayName: 'Push to registry'

  - stage: CodeQuality
    displayName: 'Code Quality'
    dependsOn: []
    jobs:
      - job: Lint
        displayName: 'Lint'
        steps:
          - script: echo "Running ESLint"
            displayName: 'ESLint'
          - script: echo "Running Prettier"
            displayName: 'Prettier'
          - script: echo "Checking imports"
            displayName: 'Check imports'

      - job: Security
        displayName: 'Security scan'
        steps:
          - script: echo "Running SAST scan"
            displayName: 'SAST scan'
          - script: echo "Checking dependencies for CVEs"
            displayName: 'CVE check'
          - script: echo "Secrets detection"
            displayName: 'Secrets detection'

      - job: CodeCoverage
        displayName: 'Code coverage'
        steps:
          - script: echo "Running coverage analysis"
            displayName: 'Coverage analysis'
          - script: echo "Uploading to SonarQube"
            displayName: 'Upload to SonarQube'

  - stage: Test
    displayName: 'Test'
    dependsOn: Build
    jobs:
      - job: UnitTests
        displayName: 'Unit tests'
        steps:
          - script: echo "Running unit tests"
            displayName: 'Run unit tests'
          - script: echo "Publishing test results"
            displayName: 'Publish results'
          - script: echo "Publishing coverage"
            displayName: 'Publish coverage'

      - job: IntegrationTests
        displayName: 'Integration tests'
        steps:
          - script: echo "Starting services"
            displayName: 'Start services'
          - script: echo "Running integration tests"
            displayName: 'Run integration tests'
          - script: echo "Stopping services"
            displayName: 'Stop services'

      - job: E2ETests
        displayName: 'E2E tests'
        steps:
          - script: echo "Installing Playwright"
            displayName: 'Install Playwright'
          - script: echo "Running E2E tests"
            displayName: 'Run E2E tests'
          - script: echo "Publishing screenshots"
            displayName: 'Publish screenshots'

      - job: PerformanceTests
        displayName: 'Performance tests'
        steps:
          - script: echo "Running load tests"
            displayName: 'Load tests'
          - script: echo "Analyzing results"
            displayName: 'Analyze results'

  - stage: DeployStaging
    displayName: 'Deploy to Staging'
    dependsOn:
      - Test
      - CodeQuality
    jobs:
      - deployment: DeployApp
        displayName: 'Deploy app'
        environment: staging
        strategy:
          runOnce:
            deploy:
              steps:
                - script: echo "Pulling latest image"
                  displayName: 'Pull image'
                - script: echo "Deploying to staging"
                  displayName: 'Deploy'
                - script: echo "Running migrations"
                  displayName: 'Run migrations'
                - script: echo "Restarting services"
                  displayName: 'Restart services'

      - job: SmokeTests
        displayName: 'Smoke tests'
        dependsOn: DeployApp
        steps:
          - script: echo "Running smoke tests"
            displayName: 'Smoke tests'
          - script: echo "Checking health endpoints"
            displayName: 'Health check'

  - stage: DeployProduction
    displayName: 'Deploy to Production'
    dependsOn: DeployStaging
    jobs:
      - deployment: DeployApp
        displayName: 'Deploy app'
        environment: production
        strategy:
          runOnce:
            deploy:
              steps:
                - script: echo "Blue/green swap"
                  displayName: 'Blue/green swap'
                - script: echo "Running migrations"
                  displayName: 'Run migrations'
                - script: echo "Health check"
                  displayName: 'Health check'
                - script: echo "Switch traffic"
                  displayName: 'Switch traffic'

      - job: Notify
        displayName: 'Notify team'
        dependsOn: DeployApp
        steps:
          - script: echo "Notifying Slack"
            displayName: 'Slack notification'
          - script: echo "Creating release notes"
            displayName: 'Release notes'